<!DOCTYPE html>

<head>

    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="shortcut icon" href="https://open.spotifycdn.com/cdn/images/favicon.0f31d2ea.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topbar">
        <nav class="navbar">

            <div class="left-group">
                <a href="index.html">
                    <img src="https://storage.googleapis.com/pr-newsroom-wp/1/2023/05/Spotify_Primary_Logo_RGB_Green.png" alt="Spotify - logo" height="40">

                <a class ="home-btn" href="index.html">

    <main class="layout">

    <footer class="player">
